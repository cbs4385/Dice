# Requires repo secrets UNITY_LICENSE (or UNITY_EMAIL+UNITY_PASSWORD+UNITY_SERIAL)
# for Unity to activate in CI. This is a supervisor/human setup step (AGENTS.md:
# "never touch real credentials") — until the secret exists this workflow will
# fail at activation, not because of a code problem.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: EditMode tests (Unity 6000.3.6f1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.6f1
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode test results
          artifactsPath: test-results
