# Requires repo secrets UNITY_LICENSE (or UNITY_EMAIL+UNITY_PASSWORD+UNITY_SERIAL)
# for Unity to activate in CI. This is a supervisor/human setup step (AGENTS.md:
# "never touch real credentials") — until the secret exists this workflow will
# fail at activation, not because of a code problem.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-editmode:
    name: EditMode tests (Unity 6000.3.6f1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-EditMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-EditMode-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.6f1
          testMode: EditMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode test results
          artifactsPath: test-results-editmode

  test-playmode:
    name: PlayMode tests (Unity 6000.3.6f1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-PlayMode-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-PlayMode-

      # PlayMode tests here run in-editor (they use UnityEditor.SceneManagement
      # APIs - see MainPlaySceneInteractionTests/ClashPlaySceneInteractionTests'
      # own header comments), not as a built standalone player, and only ever
      # inspect C# state/GameObject properties - no pixel readback - so this
      # runs headless on ubuntu-latest with no extra display setup (no Xvfb).
      - name: Run PlayMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.6f1
          testMode: PlayMode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: PlayMode test results
          artifactsPath: test-results-playmode
